name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npx eslint src/ --quiet 2>/dev/null || echo "No linter configured, skipping..."

      - name: Syntax check
        run: |
          for f in src/server.js src/app.js src/config/database.js \
                   src/controllers/notes.controller.js src/models/notes.model.js \
                   src/routes/notes.routes.js; do
            node --check "$f" && echo "✅ $f" || { echo "❌ $f"; exit 1; }
          done


  terraform-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/environments/dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Check formatting
        run: terraform fmt -check -recursive

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/environments/dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Initialize Terraform
        run: terraform init -backend=false

      - name: Validate configuration
        run: terraform validate

  packer-validate:
    name: Packer Template Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: '1.11.0'

      - name: Packer Init
        run: packer init .
        working-directory: ./packer

      - name: Packer Validate
        run: packer validate -var="environment=dev" notes-crud.pkr.hcl
        working-directory: ./packer
