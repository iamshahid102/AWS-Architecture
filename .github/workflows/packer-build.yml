name: Packer Build + Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packer/**'
      - 'backend/**'
      - 'frontend/**'
      - 'terraform/**'
      - '.github/workflows/packer-build.yml'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  TF_WORKING_DIR: ./terraform/environments/dev
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: '1.11.0'

      - name: Packer Init
        run: packer init .
        working-directory: ./packer

      - name: Packer Validate
        run: packer validate -var="environment=dev" notes-crud.pkr.hcl
        working-directory: ./packer

  ami-build:
    name: Build Custom AMI
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: ./packer
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: '1.11.0'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Packer Init
        run: packer init .

      - name: Packer Build
        id: packer
        run: |
          packer build \
            -var="environment=dev" \
            -var="domain_name=" \
            -var="ssl_email=admin@localhost" \
            -color=false \
            notes-crud.pkr.hcl 2>&1 | tee build.log

      - name: Extract AMI ID
        id: ami
        run: |
          AMI_ID=$(jq -r '.builds[-1].artifact_id' manifest.json | cut -d: -f2)
          echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT
          echo "✅ Built new AMI: $AMI_ID"

      - name: Upload Packer Manifest
        uses: actions/upload-artifact@v4
        with:
          name: packer-manifest
          path: packer/manifest.json

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: packer-build-log
          path: packer/build.log

    outputs:
      ami_id: ${{ steps.ami.outputs.ami_id }}

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: ami-build
    defaults:
      run:
        working-directory: ./terraform/environments/dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -out=tfplan \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}"

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ./terraform/environments/dev/tfplan

    outputs:
      plan_status: ${{ steps.plan.outcome }}

  terraform-apply:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.url.outputs.app_url }}
    defaults:
      run:
        working-directory: ./terraform/environments/dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: .

      - name: Terraform Apply
        id: apply
        run: |
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            tfplan

      - name: Get Application URL
        id: url
        run: |
          APP_URL=$(terraform output -raw alb_url 2>/dev/null || echo "unknown")
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT
          echo "✅ Application deployed at: $APP_URL"

      - name: Health Check
        id: health
        run: |
          APP_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "unknown")
          sleep 60
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${APP_URL}/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              curl -s "http://${APP_URL}/health"
              exit 0
            fi
            echo "Attempt $i: Health check returned $STATUS, waiting 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 2 minutes"
          exit 1

    outputs:
      app_url: ${{ steps.url.outputs.app_url }}

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [terraform-apply, ami-build]
    if: always()
    steps:
      - name: Send Status
        run: |
          AMI_ID="${{ needs.ami-build.outputs.ami_id }}"
          APP_URL="${{ needs.terraform-apply.outputs.app_url }}"
          STATUS="${{ needs.terraform-apply.result }}"

          echo "=========================================="
          echo "  🚀 Notes CRUD Deployment Report"
          echo "=========================================="
          echo "  Status: $([[ "$STATUS" == "success" ]] && echo '✅ SUCCESS' || echo '❌ FAILED')"
          echo "  AMI ID: $AMI_ID"
          echo "  URL: $APP_URL"
          echo "  Trigger: ${{ github.actor }}"
          echo "  Commit: ${{ github.sha }}"
          echo "=========================================="
